<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" fill="#f7f4ee"/>
  <rect x="48" y="48" width="1104" height="624" rx="28" fill="#fffdf8" stroke="#d5c9b9" stroke-width="2"/>
  <text x="80" y="102" fill="#262019" font-family="Bahnschrift, Segoe UI, sans-serif" font-size="34" font-weight="700">Representation Design Space</text>
  <text x="80" y="136" fill="#6c6258" font-family="Aptos, Segoe UI, sans-serif" font-size="18">Document scope and token semantics define what a spectral topic can mean</text>

  <line x1="170" y1="580" x2="1020" y2="580" stroke="#8c7d6b" stroke-width="3"/>
  <line x1="170" y1="580" x2="170" y2="190" stroke="#8c7d6b" stroke-width="3"/>
  <text x="470" y="628" fill="#5d5347" font-family="Aptos, Segoe UI, sans-serif" font-size="22">Document scope: single spectrum → region / sample support</text>
  <text x="88" y="400" transform="rotate(-90 88 400)" fill="#5d5347" font-family="Aptos, Segoe UI, sans-serif" font-size="22">Word semantics: intensity histogram → wavelength-aware event</text>

  <g font-family="Aptos, Segoe UI, sans-serif">
    <rect x="230" y="470" width="210" height="92" rx="18" fill="#d8b14b"/>
    <text x="255" y="505" fill="#3f3211" font-size="22" font-weight="700">Magnitude phrase</text>
    <text x="255" y="534" fill="#4b3d17" font-size="16">ordered spectrum,</text>
    <text x="255" y="556" fill="#4b3d17" font-size="16">token = quantized value</text>

    <rect x="220" y="290" width="220" height="92" rx="18" fill="#c48a63"/>
    <text x="245" y="325" fill="#fff7f0" font-size="22" font-weight="700">Band frequency</text>
    <text x="245" y="354" fill="#fff0e4" font-size="16">token = wavelength,</text>
    <text x="245" y="376" fill="#fff0e4" font-size="16">count = magnitude</text>

    <rect x="500" y="250" width="230" height="92" rx="18" fill="#55707a"/>
    <text x="525" y="285" fill="#eff9fc" font-size="22" font-weight="700">Band-magnitude</text>
    <text x="525" y="314" fill="#dcedf2" font-size="16">token preserves</text>
    <text x="525" y="336" fill="#dcedf2" font-size="16">location + response</text>

    <rect x="710" y="420" width="230" height="92" rx="18" fill="#705845"/>
    <text x="735" y="455" fill="#fff7f0" font-size="22" font-weight="700">Region documents</text>
    <text x="735" y="484" fill="#f5e5da" font-size="16">patch, SLIC, ROI,</text>
    <text x="735" y="506" fill="#f5e5da" font-size="16">support aggregation</text>

    <rect x="850" y="220" width="220" height="92" rx="18" fill="#4f6a3b"/>
    <text x="875" y="255" fill="#f5fff0" font-size="22" font-weight="700">Absorption shape</text>
    <text x="875" y="284" fill="#e0f2d5" font-size="16">wavelength-aware</text>
    <text x="875" y="306" fill="#e0f2d5" font-size="16">feature events</text>

    <rect x="900" y="420" width="190" height="92" rx="18" fill="#5e4574"/>
    <text x="925" y="455" fill="#faf2ff" font-size="22" font-weight="700">Hierarchical</text>
    <text x="925" y="484" fill="#eadbfd" font-size="16">sample → region</text>
    <text x="925" y="506" fill="#eadbfd" font-size="16">→ spectrum</text>
  </g>

  <circle cx="330" cy="590" r="5" fill="#8c7d6b"/>
  <circle cx="330" cy="580" r="5" fill="#8c7d6b"/>
  <circle cx="330" cy="200" r="5" fill="#8c7d6b"/>
  <circle cx="1010" cy="580" r="5" fill="#8c7d6b"/>

  <text x="170" y="166" fill="#6f6255" font-family="Aptos, Segoe UI, sans-serif" font-size="17">Higher on the chart = stronger physical interpretability, but also stronger metadata requirements.</text>
  <text x="170" y="676" fill="#6f6255" font-family="Aptos, Segoe UI, sans-serif" font-size="17">Further right on the chart = more local context, better for sample supports, but more sensitive to region definition.</text>
</svg>
